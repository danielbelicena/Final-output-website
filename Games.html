<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games - New Gen Gaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
font-family:Poppins,sans-serif;
}

.game-card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
text-align:center;
transition:.4s;
cursor:pointer;
}

.game-card:hover{
transform:scale(1.05);
}

.game-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.game-modal-content{
background:#0f172a;
padding:40px;
border-radius:20px;
max-width:600px;
}

.close-btn{
position:absolute;
top:20px;
right:40px;
font-size:35px;
cursor:pointer;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">New Gen Gaming</a>

<div>
<a class="nav-link text-light d-inline" href="index.html">Home</a>
<a class="nav-link text-light d-inline" href="games.html">Games</a>
<a class="nav-link text-light d-inline" href="about.html">About</a>
</div>
</div>
</nav>

<div class="container my-5">

<h2 class="text-center mb-5">Popular Games</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="game-card" onclick="openGame('Red Dead Redemption 2','An immersive western open-world experience.','https://upload.wikimedia.org/wikipedia/en/4/44/Red_Dead_Redemption_II.jpg')">
<h4>Red Dead Redemption 2</h4>
</div>
</div>

<div class="col-md-4">
<div class="game-card" onclick="openGame('Ghost of Tsushima','Samurai action masterpiece.','https://upload.wikimedia.org/wikipedia/en/b/b6/Ghost_of_Tsushima.jpg')">
<h4>Ghost of Tsushima</h4>
</div>
</div>

<div class="col-md-4">
<div class="game-card" onclick="openGame('God of War Ragnarok','Epic Norse adventure.','https://upload.wikimedia.org/wikipedia/en/e/ee/God_of_War_Ragnar%C3%B6k_cover.jpg')">
<h4>God of War Ragnarok</h4>
</div>
</div>

</div>

</div>

<div id="gameModal" class="game-modal">
<span class="close-btn" onclick="closeGame()">×</span>

<div class="game-modal-content">
<img id="modalImage" style="width:100%;border-radius:10px;">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
</div>

</div>

<script>

function openGame(title,desc,img){
document.getElementById("modalTitle").innerText=title
document.getElementById("modalDesc").innerText=desc
document.getElementById("modalImage").src=img
document.getElementById("gameModal").style.display="flex"
}

function closeGame(){
document.getElementById("gameModal").style.display="none"
}

</script>

</body>
</html>
